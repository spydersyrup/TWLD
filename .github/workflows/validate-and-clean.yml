name: Validate, clean, and deploy
on:
  pull_request:
    paths:
      - 'data/events/**'
      - 'images/**'
      - 'scripts/**'
  push:
    branches: [main]
    paths:
      - 'data/events/**'
      - 'images/**'
      - 'scripts/**'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  validate-clean-deploy:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install exiftool
        run: sudo apt-get update && sudo apt-get install -y libimage-exiftool-perl
      - name: Strip EXIF from all images
        run: |
          if [ -d images ]; then
            find images -type f \( -iname "*.jpg" -o -iname "*.jpeg" -o -iname "*.png" \) -exec exiftool -all= -overwrite_original {} \;
          fi
      - name: Validate all event JSON files
        shell: bash
        run: |
          shopt -s nullglob
          for file in data/events/*.json; do
            echo "Checking $file"
            node scripts/validate-entry.js "$file"
          done
      - name: Build site
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: node scripts/build-site.js
      - name: Commit and push changes
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add images/ docs/
          if ! git diff --staged --quiet; then
            git commit -m "Strip EXIF metadata and rebuild site"
            git push
          fi
